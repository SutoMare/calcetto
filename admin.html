<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <title>Pannello Admin - Fanta Mondiali</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { font-family: sans-serif; background-color: #343a40; color: white; padding: 40px; text-align: center; }
    .admin-card { background-color: #212529; border-radius: 8px; padding: 40px; max-width: 600px; margin: 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    h1 { color: #f8f9fa; }
    .btn-admin {
      background-color: #dc3545; color: white; border: none; padding: 15px 30px; font-size: 20px; font-weight: bold; border-radius: 5px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;
    }
    .btn-admin:hover { background-color: #c82333; }
    .btn-admin:disabled { background-color: #6c757d; cursor: not-allowed; }
    #log-area {
      margin-top: 30px; background-color: #000; padding: 15px; border-radius: 5px; text-align: left; font-family: monospace; color: #28a745; min-height: 150px;
    }
  </style>
</head>
<body>

  <div class="admin-card">
    <h1>👨‍⚖️ Pannello dell'Arbitro</h1>
    <p style="color: #adb5bd; margin-bottom: 30px;">
      Ricorda: Prima di premere questo bottone, assicurati di aver inserito i risultati reali (e spuntato "finita") nella tabella <b>partite</b> su Supabase.
    </p>

    <button id="btn-calcola" class="btn-admin">Esegui Calcolo Punti</button>

    <div id="log-area">
      > Attesa comandi...<br>
    </div>
    
    <div style="margin-top: 20px;">
        <a href="index.html" style="color: #17a2b8;">Torna al sito pubblico</a>
    </div>
  </div>

  <script type="module" src="admin.js"></script>
</body>
</html>
