<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <title>Dettaglio Partita - Fanta Mondiali</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .match-header-info { text-align: center; padding: 20px 0; }
    .match-header-info h2 { font-size: 2rem; margin-bottom: 10px; }
    .match-result-box { 
      background-color: var(--bg-color, #f8f9fa); 
      padding: 15px; 
      border-radius: 8px; 
      display: inline-block; 
      margin-top: 10px; 
      border: 1px solid var(--border-color, #eee); 
    }
    .action-container { text-align: center; margin-top: 40px; display: none; }
    .btn-large { font-size: 1.2rem; padding: 15px 40px; }
    
    /* Centriamo i testi della tabella per renderla più ordinata */
    .leaderboard-table th, .leaderboard-table td { text-align: center; vertical-align: middle; }
    .leaderboard-table th:first-child, .leaderboard-table td:first-child { text-align: left; } /* Teniamo il nome a sinistra */
  </style>
</head>
<body>

  <header>
    <h1>🔍 Dettaglio Partita</h1>
    <a href="index.html" class="btn-pronostico">⬅️ Torna alla Home</a>
  </header>

  <main>
    <section class="card match-header-info">
      <h2 id="match-title">Caricamento partita...</h2>
      <div id="match-status-container"></div>
    </section>

    <section class="card">
      <h2>📋 Pronostici dei Giocatori</h2>
      
      <div style="overflow-x: auto;">
        <table class="leaderboard-table">
          <thead>
            <tr>
              <th>Utente</th>
              <th>Vincitore</th>
              <th>Risultato</th>
              <th>Marcatori</th>
              <!-- Nascosta di default, si accende se la partita è finita -->
              <th id="th-punti" style="display: none;">Punti Totali</th>
            </tr>
          </thead>
          <tbody id="predictions-body">
            <tr><td colspan="5" style="text-align: center; padding: 20px;">Caricamento in corso...</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <div id="action-container" class="action-container">
      <a href="login.html" class="btn-pronostico btn-large">Fai il tuo Pronostico! 🎯</a>
    </div>

  </main>

  <script type="module" src="partita.js"></script>
</body>
</html>
