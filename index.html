<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <title>Scommessine</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Scommessine</h1>
    <a href="login.html" class="btn-pronostico">Fai Pronostico ➡️</a>
  </header>

  <main class="main-layout">
    
    <section class="left-column">
      
      <div class="card">
        <h2>Prossimi Match</h2>
        <!-- Svuotato: i dati veri li carica index.js -->
        <div id="upcoming-matches">
        </div>
      </div>
      
      <div class="card">
        <h2>Match Passati & Risultati</h2>
        <!-- Svuotato: i dati veri li carica index.js -->
        <div id="past-matches">
        </div>
      </div>
      
    </section>
    
    <section class="right-column">
      <div class="card">
        <h2>Classifica</h2>
        <div class="leaderboard-table-container">
          <table class="leaderboard-table">
            <thead>
              <tr>
                <th>Pos.</th>
                <th>Giocatore</th>
                <th>Punti Totali</th>
                <th>Punti Turno</th>
              </tr>
            </thead>
            <!-- Svuotato: i dati veri li carica index.js -->
            <tbody id="leaderboard-body">
            </tbody>
          </table>
        </div>
      </div>
      
      </section>

  </main>

  <footer>
    <p style="text-align: center; color: #888; margin-top: 50px; font-size: 0.9em;">Progetto Personale Mondiali © 2026</p>
    <!-- NUOVO BOTTONE ADMIN -->
    <div style="text-align: center;">
      <a href="admin.html" class="btn-admin-link">Aggiorna risultati</a>
    </div>
  </footer>

<script type="module" src="index.js"></script>
</body>
</html>
